apiVersion: v1
kind: ServiceAccount
metadata:
  name: capbm-helm
  namespace: kube-system
  labels:
    app.kubernetes.io/name: capbm-helm
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capbm-helm
  labels:
    app.kubernetes.io/name: capbm-helm
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
rules:
# Allow Helm to install/upgrade any resources
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
# Allow reading/writing ConfigMaps for status tracking
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# Allow reading Secrets for chart values
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capbm-helm
  labels:
    app.kubernetes.io/name: capbm-helm
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capbm-helm
subjects:
- kind: ServiceAccount
  name: capbm-helm
  namespace: kube-system
