apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  name: baremetalmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: BareMetalMachine
    listKind: BareMetalMachineList
    plural: baremetalmachines
    singular: baremetalmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Cluster
      jsonPath: .metadata.labels.cluster\.x-k8s\.io/cluster-name
      name: Cluster
      type: string
    - description: Machine is ready
      jsonPath: .status.ready
      name: Ready
      type: string
    - description: Provider ID
      jsonPath: .status.providerID
      name: ProviderID
      type: string
    - description: IP Address
      jsonPath: .spec.ipAddress
      name: IPAddress
      type: string
    - description: Time duration since creation
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta2
    schema:
      openAPIV3Schema:
        description: BareMetalMachine is the Schema for the baremetalmachines API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: BareMetalMachineSpec defines the desired state of BareMetalMachine.
            properties:
              credentialsRef:
                description: CredentialsRef references the Secret containing SSH credentials.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              hostInventoryRef:
                description: HostInventoryRef references the BareMetalHostInventory to allocate a host from.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              hostName:
                description: HostName is the hostname of the bare metal machine.
                type: string
              ipAddress:
                description: IPAddress is the IP address of the bare metal machine.
                type: string
              powerManagement:
                description: PowerManagement holds optional power management configuration.
                properties:
                  address:
                    description: Address is the BMC address.
                    type: string
                  credentialsRef:
                    description: CredentialsRef references the Secret containing BMC credentials.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  type:
                    description: Type is the power management protocol type (ipmi, redfish).
                    type: string
                required:
                - address
                - credentialsRef
                - type
                type: object
              providerID:
                description: ProviderID will be the machine name in ProviderID format.
                type: string
              role:
                description: Role indicates the role of this machine.
                type: string
              sshPort:
                default: 22
                description: SSHPort is the SSH port to connect to.
                type: integer
            type: object
          status:
            description: BareMetalMachineStatus defines the observed state of BareMetalMachine.
            properties:
              addresses:
                description: Addresses contains the addresses associated with this machine.
                items:
                  description: MachineAddress contains information for the node's address.
                  properties:
                    address:
                      description: The machine address.
                      type: string
                    type:
                      description: Machine address type.
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: Conditions defines current service state of the BareMetalMachine.
                items:
                  description: Condition defines an observation of a Cluster API resource operational state.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    severity:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
              providerID:
                description: ProviderID is the unique identifier for this machine.
                type: string
              ready:
                description: Ready indicates that the machine is ready.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
