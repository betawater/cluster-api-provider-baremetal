apiVersion: v1
kind: ServiceAccount
metadata:
  name: capbm-image-importer
  namespace: capbm-system
  labels:
    app.kubernetes.io/name: capbm-image-importer
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capbm-image-importer
  labels:
    app.kubernetes.io/name: capbm-image-importer
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
rules:
# Allow reading ReleaseImage resources
- apiGroups: ["infrastructure.cluster.x-k8s.io"]
  resources: ["releaseimages"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["infrastructure.cluster.x-k8s.io"]
  resources: ["releaseimages/status"]
  verbs: ["get", "update", "patch"]
# Allow reading ConfigMaps and Secrets for registry configuration
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
# Allow managing Jobs for import tracking
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
# Allow using hostPath for containerd socket
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capbm-image-importer
  labels:
    app.kubernetes.io/name: capbm-image-importer
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capbm-image-importer
subjects:
- kind: ServiceAccount
  name: capbm-image-importer
  namespace: capbm-system
