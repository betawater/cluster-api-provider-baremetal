apiVersion: v1
kind: ServiceAccount
metadata:
  name: capbm-manifest
  namespace: kube-system
  labels:
    app.kubernetes.io/name: capbm-manifest
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capbm-manifest
  labels:
    app.kubernetes.io/name: capbm-manifest
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
rules:
# Allow kubectl to apply any resources
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# Allow reading/writing ConfigMaps for status tracking
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capbm-manifest
  labels:
    app.kubernetes.io/name: capbm-manifest
    app.kubernetes.io/part-of: cluster-api-provider-baremetal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capbm-manifest
subjects:
- kind: ServiceAccount
  name: capbm-manifest
  namespace: kube-system
