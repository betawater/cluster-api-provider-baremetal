apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: baremetal-clusterclass-v0.1.0
  namespace: default
spec:
  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: baremetal-clusterclass-v0.1.0-control-plane
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        name: baremetal-clusterclass-v0.1.0-control-plane
    healthCheck:
      checks:
        nodeStartupTimeoutSeconds: 900
        unhealthyNodeConditions:
        - type: Ready
          status: Unknown
          timeoutSeconds: 300
        - type: Ready
          status: "False"
          timeoutSeconds: 300
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: BareMetalClusterTemplate
      name: baremetal-clusterclass-v0.1.0
  workers:
    machineDeployments:
    - class: default-worker
      bootstrap:
        templateRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: baremetal-clusterclass-v0.1.0-default-worker
      infrastructure:
        templateRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: BareMetalMachineTemplate
          name: baremetal-clusterclass-v0.1.0-default-worker
      healthCheck:
        checks:
          nodeStartupTimeoutSeconds: 600
          unhealthyNodeConditions:
          - type: Ready
            status: Unknown
            timeoutSeconds: 300
          - type: Ready
            status: "False"
            timeoutSeconds: 300
  variables:
  - name: controlPlaneEndpoint
    required: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          host:
            type: string
            description: "Control plane load balancer address"
          port:
            type: integer
            description: "API Server port"
            default: 6443
  - name: credentialsSecret
    required: true
    schema:
      openAPIV3Schema:
        type: string
        description: "SSH credentials Secret name"
  - name: hostInventoryRef
    required: true
    schema:
      openAPIV3Schema:
        type: string
        description: "BareMetalHostInventory resource name"
  - name: kubernetesVersion
    required: true
    schema:
      openAPIV3Schema:
        type: string
        description: "Kubernetes version"
        pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  - name: podCIDR
    schema:
      openAPIV3Schema:
        type: string
        default: "10.244.0.0/16"
        description: "Pod CIDR"
  - name: serviceCIDR
    schema:
      openAPIV3Schema:
        type: string
        default: "10.96.0.0/12"
        description: "Service CIDR"
  - name: preFlightChecks
    schema:
      openAPIV3Schema:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          minDiskGB:
            type: integer
            default: 20
          minMemoryGB:
            type: integer
            default: 2
  - name: componentInstall
    schema:
      openAPIV3Schema:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          strategy:
            type: string
            default: "InstallIfMissing"
            enum:
              - "InstallIfMissing"
              - "AlwaysInstall"
              - "Skip"
          containerRuntime:
            type: object
            properties:
              type:
                type: string
                default: "containerd"
                enum:
                  - "containerd"
                  - "cri-o"
                  - "docker"
              version:
                type: string
              registryMirrors:
                type: array
                items:
                  type: string
          kubernetes:
            type: object
            properties:
              repository:
                type: object
                properties:
                  baseUrl:
                    type: string
                  gpgKey:
                    type: string
          airGap:
            type: object
            properties:
              enabled:
                type: boolean
                default: false
              binarySource:
                type: string
                default: "HTTPServer"
                enum:
                  - "HTTPServer"
                  - "ConfigMap"
                  - "LocalPath"
              httpServerConfig:
                type: object
                properties:
                  baseUrl:
                    type: string
                  insecureSkipVerify:
                    type: boolean
                    default: false
              preloadImages:
                type: array
                items:
                  type: string
          timeout:
            type: string
            default: "300s"
          rollbackOnError:
            type: boolean
            default: false
          maxRetries:
            type: integer
            default: 3
  - name: firewall
    schema:
      openAPIV3Schema:
        type: object
        properties:
          configure:
            type: boolean
            default: true
          autoDetect:
            type: boolean
            default: true
          additionalPorts:
            type: array
            items:
              type: object
              properties:
                port:
                  type: integer
                protocol:
                  type: string
                  default: "tcp"
                description:
                  type: string
  - name: selinux
    schema:
      openAPIV3Schema:
        type: object
        properties:
          configure:
            type: boolean
            default: true
  patches:
  - name: controlPlaneEndpoint
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalClusterTemplate
        matchResources:
          infrastructureCluster: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/controlPlaneEndpoint/host
        valueFrom:
          variable: controlPlaneEndpoint.host
      - op: add
        path: /spec/template/spec/controlPlaneEndpoint/port
        valueFrom:
          variable: controlPlaneEndpoint.port
  - name: credentialsSecret
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/credentialsRef/name
        valueFrom:
          variable: credentialsSecret
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          machineDeploymentClass:
            names:
            - default-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/credentialsRef/name
        valueFrom:
          variable: credentialsSecret
  - name: hostInventoryRef
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/hostInventoryRef/name
        valueFrom:
          variable: hostInventoryRef
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          machineDeploymentClass:
            names:
            - default-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/hostInventoryRef/name
        valueFrom:
          variable: hostInventoryRef
  - name: kubernetesVersion
    definitions:
    - selector:
        apiVersion: controlplane.cluster.x-k8s.io/v1beta1
        kind: KubeadmControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/version
        valueFrom:
          variable: kubernetesVersion
  - name: networkCIDRs
    definitions:
    - selector:
        apiVersion: controlplane.cluster.x-k8s.io/v1beta1
        kind: KubeadmControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/networking/podSubnet
        valueFrom:
          variable: podCIDR
      - op: add
        path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/networking/serviceSubnet
        valueFrom:
          variable: serviceCIDR
  - name: componentInstall
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/componentInstall
        valueFrom:
          variable: componentInstall
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          machineDeploymentClass:
            names:
            - default-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/componentInstall
        valueFrom:
          variable: componentInstall
  - name: firewall
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/firewall
        valueFrom:
          variable: firewall
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          machineDeploymentClass:
            names:
            - default-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/firewall
        valueFrom:
          variable: firewall
  - name: selinux
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/selinux
        valueFrom:
          variable: selinux
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: BareMetalMachineTemplate
        matchResources:
          machineDeploymentClass:
            names:
            - default-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/selinux
        valueFrom:
          variable: selinux
