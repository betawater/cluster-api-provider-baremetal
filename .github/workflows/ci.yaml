name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: |
          make test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build CVO module
        run: |
          make build-cvo

      - name: Build CAPBM module
        run: |
          make build-capbm

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run golangci-lint (cvo)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: modules/cvo

      - name: Run golangci-lint (capbm)
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: modules/capbm
