name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Verify Kustomize
        run: kustomize version

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CVO Docker image
        run: |
          make docker-build-cvo CVO_IMG=ghcr.io/${{ github.repository_owner }}/cvo-manager:${{ github.ref_name }}

      - name: Build and push CAPBM Docker image
        run: |
          make docker-build-capbm CAPBM_IMG=ghcr.io/${{ github.repository_owner }}/capbm-manager:${{ github.ref_name }}

      - name: Generate CVO release manifests
        run: |
          make release-cvo CVO_IMG=ghcr.io/${{ github.repository_owner }}/cvo-manager:${{ github.ref_name }}

      - name: Generate CAPBM release manifests
        run: |
          make release-capbm CAPBM_IMG=ghcr.io/${{ github.repository_owner }}/capbm-manager:${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            infrastructure-components.yaml
            cvo-components.yaml
            metadata.yaml
          generate_release_notes: true
